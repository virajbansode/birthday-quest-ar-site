
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Quest Complete 🎉</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="config.js"></script>
</head>
<body>
  <header class="header">
    <h1 id="headline">You did it! 🎉</h1>
    <p id="message">Ready for the AR magic?</p>
    <div class="nav" style="margin-top:12px">
      <a class="button secondary" href="ar.html">Open AR Reveal</a>
      <a class="button ghost" href="index.html">Home</a>
    </div>
  </header>

  <main class="container">
    <section class="card center">
      <p class="caption">P.S. You can reset your progress if you want to replay.</p>
      <button id="resetBtn" class="button">Reset Progress</button>
    </section>
  </main>

  <footer class="footer">With love 💝</footer>

  <script>
    (function(){
      const cfg = window.QUEST_CONFIG||{}; const fin = cfg.finale||{};
      document.getElementById('headline').textContent = fin.headline || 'You did it! 🎉';
      document.getElementById('message').textContent = fin.message || 'Ready for the AR magic?';
      if(window.confetti){ confetti({particleCount:220, spread:80, origin:{y:.6}}); }
      document.getElementById('resetBtn').addEventListener('click', ()=>{ localStorage.removeItem('bquest.progress'); alert('Progress reset!'); });
    })();
  </script>
</body>
</html>
